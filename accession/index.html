<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Content-Security-Policy (defense-in-depth; the host also sends it as a
         header). Scripts/wasm same-origin only; the only network egress allowed
         is the visitor's own browser -> api.anthropic.com (BYOK), so even an
         injected script can't send the API key anywhere else. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.anthropic.com; base-uri 'none'; form-action 'none'; object-src 'none'"
    />
    <title>SGU Archive — the complete transcript record</title>
    <meta
      name="description"
      content="The complete transcript record of The Skeptics' Guide to the Universe. Twenty years of evidence, catalogued and searchable."
    />
    <!-- favicon: a four-line emission spectrum, the archive's mark -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='2' fill='%230C0F16'/%3E%3Crect x='3' y='3' width='1.2' height='10' fill='%23B0524C'/%3E%3Crect x='6' y='3' width='1.2' height='10' fill='%23B6924F'/%3E%3Crect x='9' y='3' width='1.2' height='10' fill='%235FB6A6'/%3E%3Crect x='12' y='3' width='1.2' height='10' fill='%236C6CB0'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- sql.js-httpvfs UMD bundle — attaches createDbWorker to window (must be a classic script) -->
    <script src="/vendor/index.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
